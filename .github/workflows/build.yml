name: Build & Release

# Compila o programa em Windows e Linux e anexa os executáveis ao Release.
# Dispara ao enviar uma tag começando com "v" (ex.: v1.0.0).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # permite rodar manualmente pela aba Actions

permissions:
  contents: write  # necessário para criar o Release e anexar arquivos

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: RDDownloader-windows.exe
            built: dist/RDDownloader.exe
          - os: ubuntu-latest
            artifact: RDDownloader-linux
            built: dist/RDDownloader
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Dependências de sistema (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0

      - name: Compilar com PyInstaller
        run: pyinstaller --onefile --windowed --name RDDownloader rddownloader.py

      - name: Preparar artefato
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.built }}" "out/${{ matrix.artifact }}"

      - name: Anexar ao Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.artifact }}
          fail_on_unmatched_files: true

      - name: Publicar como artifact (execução manual)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}
